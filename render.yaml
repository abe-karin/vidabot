services:
  - type: web
    name: vidabot
    env: python
    branch: main
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-3.5-turbo
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514
