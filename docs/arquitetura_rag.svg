<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="520" fill="#F5F0E8" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#0D1B2A">InsurMinds VidaBot — Arquitetura RAG</text>
  <line x1="80" y1="48" x2="820" y2="48" stroke="#C9A84C" stroke-width="2"/>

  <!-- USUÁRIO -->
  <rect x="50" y="80" width="130" height="70" rx="10" fill="#0D1B2A"/>
  <text x="115" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="white">👤 Usuário</text>
  <text x="115" y="130" text-anchor="middle" font-size="11" fill="#C9A84C">Faz a pergunta</text>

  <!-- Seta 1 -->
  <line x1="180" y1="115" x2="230" y2="115" stroke="#C9A84C" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="205" y="108" text-anchor="middle" font-size="9" fill="#5A6978">pergunta</text>

  <!-- FRONTEND -->
  <rect x="230" y="80" width="140" height="70" rx="10" fill="#1B2E45"/>
  <text x="300" y="107" text-anchor="middle" font-size="12" font-weight="bold" fill="white">🖥 Frontend</text>
  <text x="300" y="123" text-anchor="middle" font-size="10" fill="#C9A84C">HTML + CSS + JS</text>
  <text x="300" y="138" text-anchor="middle" font-size="9" fill="#8A96A3">index.html</text>

  <!-- Seta 2 -->
  <line x1="370" y1="115" x2="420" y2="115" stroke="#C9A84C" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="395" y="108" text-anchor="middle" font-size="9" fill="#5A6978">fetch POST</text>

  <!-- BACKEND -->
  <rect x="420" y="80" width="140" height="70" rx="10" fill="#243B55"/>
  <text x="490" y="107" text-anchor="middle" font-size="12" font-weight="bold" fill="white">⚙ Backend</text>
  <text x="490" y="123" text-anchor="middle" font-size="10" fill="#C9A84C">Python + Flask</text>
  <text x="490" y="138" text-anchor="middle" font-size="9" fill="#8A96A3">app.py /api/chat</text>

  <!-- Seta para RAG (para baixo) -->
  <line x1="490" y1="150" x2="490" y2="220" stroke="#C9A84C" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="510" y="190" font-size="9" fill="#5A6978">busca RAG</text>

  <!-- RAG BOX -->
  <rect x="370" y="220" width="240" height="90" rx="10" fill="#C9A84C" opacity="0.15" stroke="#C9A84C" stroke-width="2"/>
  <text x="490" y="248" text-anchor="middle" font-size="13" font-weight="bold" fill="#0D1B2A">🔍 RAG Engine</text>
  <text x="490" y="267" text-anchor="middle" font-size="10" fill="#1B2E45">Score por keywords</text>
  <text x="490" y="283" text-anchor="middle" font-size="10" fill="#1B2E45">Top-3 chunks relevantes</text>
  <text x="490" y="299" text-anchor="middle" font-size="9" fill="#5A6978">buscar_rag(pergunta)</text>

  <!-- Seta RAG para FAQ -->
  <line x1="370" y1="265" x2="310" y2="265" stroke="#C9A84C" stroke-width="2" marker-end="url(#arrowLeft)"/>

  <!-- FAQ BASE -->
  <rect x="140" y="230" width="170" height="70" rx="10" fill="#0D1B2A"/>
  <text x="225" y="257" text-anchor="middle" font-size="12" font-weight="bold" fill="white">📄 Base RAG</text>
  <text x="225" y="274" text-anchor="middle" font-size="10" fill="#C9A84C">faq.txt</text>
  <text x="225" y="289" text-anchor="middle" font-size="9" fill="#8A96A3">15 chunks de seguros</text>

  <!-- Seta RAG retorno contexto para Backend -->
  <line x1="490" y1="310" x2="490" y2="360" stroke="#C9A84C" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="510" y="342" font-size="9" fill="#5A6978">contexto</text>

  <!-- LLM -->
  <rect x="620" y="80" width="140" height="70" rx="10" fill="#0D1B2A"/>
  <text x="690" y="107" text-anchor="middle" font-size="12" font-weight="bold" fill="white">🤖 Claude API</text>
  <text x="690" y="123" text-anchor="middle" font-size="10" fill="#C9A84C">Anthropic LLM</text>
  <text x="690" y="138" text-anchor="middle" font-size="9" fill="#8A96A3">claude-sonnet-4</text>

  <!-- Seta Backend para Claude -->
  <line x1="560" y1="115" x2="620" y2="115" stroke="#C9A84C" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="590" y="108" text-anchor="middle" font-size="9" fill="#5A6978">system+msg</text>

  <!-- Seta Claude para Frontend (resposta) -->
  <line x1="690" y1="150" x2="690" y2="360" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="690" y1="360" x2="300" y2="360" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>
  <text x="600" y="352" text-anchor="middle" font-size="9" fill="#16a34a">resposta gerada</text>

  <!-- RESPOSTA FINAL -->
  <rect x="230" y="360" width="140" height="55" rx="10" fill="#1B2E45"/>
  <text x="300" y="383" text-anchor="middle" font-size="11" font-weight="bold" fill="white">💬 Resposta</text>
  <text x="300" y="400" text-anchor="middle" font-size="9" fill="#C9A84C">Exibida no chat</text>

  <!-- Seta resposta para usuário -->
  <line x1="230" y1="387" x2="180" y2="387" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>
  <line x1="115" y1="387" x2="115" y2="150" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>

  <!-- DEPLOY BOX -->
  <rect x="650" y="240" width="180" height="100" rx="10" fill="white" stroke="#C9A84C" stroke-width="1.5"/>
  <text x="740" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="#0D1B2A">☁ Deploy</text>
  <text x="740" y="285" text-anchor="middle" font-size="10" fill="#1B2E45">Render / Vercel</text>
  <text x="740" y="302" text-anchor="middle" font-size="9" fill="#5A6978">gunicorn app:app</text>
  <text x="740" y="318" text-anchor="middle" font-size="9" fill="#5A6978">Var: ANTHROPIC_API_KEY</text>
  <text x="740" y="332" text-anchor="middle" font-size="9" fill="#16a34a">URL pública gerada</text>

  <!-- Legenda -->
  <rect x="50" y="430" width="800" height="70" rx="8" fill="white" stroke="#CCCCCC" stroke-width="1"/>
  <text x="450" y="452" text-anchor="middle" font-size="11" font-weight="bold" fill="#0D1B2A">Legenda do Fluxo</text>
  <line x1="80" y1="465" x2="120" y2="465" stroke="#C9A84C" stroke-width="2"/>
  <text x="130" y="469" font-size="10" fill="#1B2E45">Fluxo de pergunta (requisição)</text>
  <line x1="280" y1="465" x2="320" y2="465" stroke="#4ade80" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="330" y="469" font-size="10" fill="#1B2E45">Fluxo de resposta (retorno)</text>
  <rect x="480" y="458" width="12" height="12" rx="2" fill="#C9A84C" opacity="0.3" stroke="#C9A84C"/>
  <text x="500" y="469" font-size="10" fill="#1B2E45">RAG Engine (recuperação de contexto)</text>
  <rect x="680" y="458" width="12" height="12" rx="2" fill="#0D1B2A"/>
  <text x="700" y="469" font-size="10" fill="#1B2E45">Claude API (LLM Gerador)</text>

  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C9A84C"/>
    </marker>
    <marker id="arrowLeft" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#C9A84C"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/>
    </marker>
  </defs>
</svg>
